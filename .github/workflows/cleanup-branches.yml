name: Remove feature images on branch deletion

permissions:
  contents: read
  packages: write

on:
  delete:

jobs:
  delete:
    if: github.event.ref_type == 'branch' && (startsWith(github.event.ref, 'feature/') ||startsWith(github.event.ref, 'fix/'))
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image-name: [tna-python, tna-python-dev]
    steps:
      - name: Prepare image tag
        run: |
          # Strip git ref prefix from version
          VERSION=$(echo "${{ github.event.ref }}" | sed -e 's,.*/\(.*\),\1,')
          echo "TAG=$VERSION" >> "$GITHUB_ENV"

      - name: Output image tag
        run: echo "Clean up Docker image ${{ matrix.image-name }}:${{ env.TAG }}"

      - name: Delete image
        uses: bots-house/ghcr-delete-image-action@v1.1.0
        with:
          owner: ${{ github.repository_owner }}
          name: ${{ env.IMAGE_ID }}
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ env.TAG }}
